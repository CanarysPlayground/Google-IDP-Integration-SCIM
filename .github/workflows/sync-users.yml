name: Google Workspace → GitHub EMU Synchronization

on:
  workflow_dispatch:
    inputs:
      owner_group:
        description: "Google Group for Enterprise Owners"
        required: true
        default: "github-enterprise-owners@yourdomain.com"

      member_group:
        description: "Google Group for Enterprise Members"
        required: true
        default: "github-enterprise-members@yourdomain.com"

      dry_run:
        description: "Run without making changes"
        required: true
        type: boolean
        default: false

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

concurrency:
  group: github-emu-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Synchronize Google Workspace Users
    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:
      GITHUB_ENTERPRISE: ${{ secrets.GITHUB_ENTERPRISE }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      GOOGLE_ADMIN_USER: ${{ secrets.GOOGLE_ADMIN_USER }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      OWNER_GROUP: ${{ github.event.inputs.owner_group }}
      MEMBER_GROUP: ${{ github.event.inputs.member_group }}

      DRY_RUN: ${{ github.event.inputs.dry_run }}

      MAX_RETRIES: 5
      RETRY_BACKOFF: 2

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Service Account File
        run: |
          cat > service-account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Verify Environment
        run: |
          echo "Enterprise : ${GITHUB_ENTERPRISE}"
          echo "Owner Group : ${OWNER_GROUP}"
          echo "Member Group : ${MEMBER_GROUP}"
          echo "Dry Run : ${DRY_RUN}"

      - name: Execute Synchronization
        run: |
          python sync-users.py

      - name: Upload CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-report
          path: reports/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: logs/

      - name: Cleanup Credentials
        if: always()
        run: |
          rm -f service-account.json
